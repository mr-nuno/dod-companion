services:
  ravendb:
    image: ravendb/ravendb:latest
    environment:
      RAVEN_Setup_Mode: None
      RAVEN_License_Eula_Accepted: "true"
      RAVEN_Security_UnsecuredAccessAllowed: PublicNetwork
    ports:
      - "8080:8080"
    volumes:
      - ravendb-data:/var/lib/ravendb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/setup/alive"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
      
  api:
    build:
      context: ./backend
      args:
        VERSION: 1.0.0
    # Secrets (the OAuth client secret) live in backend/.env, loaded into the container.
    # Copy backend/.env.example to backend/.env and set RulesApi__Auth__ClientSecret.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Raven__Urls__0: http://ravendb:8080
      Raven__DatabaseName: DodCompanion
      RulesApi__BaseUrl: https://pdf-search-api-1-0-0.onrender.com
      RulesApi__CacheSeconds: "60"
      # Requests are proxied same-origin by the frontend, but allow the dev origin too.
      Cors__AllowedOrigins__0: http://localhost:8081
    depends_on:
      ravendb:
        condition: service_healthy
    ports:
      - "5116:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      NGINX_PORT: "80"
      API_UPSTREAM: api:8080
      APP_API_BASE_URL: "" # empty => same-origin; nginx proxies /sessions, /log-entries, /rules, /hubs
    depends_on:
      - api
    ports:
      - "8081:80"

volumes:
  ravendb-data:
